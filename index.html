<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1">
 <title>受験講座ダッシュボード</title>

 <link rel="preconnect" href="https://fonts.googleapis.com"crossorigin>
 <link rel="preconnect" href="https://fonts.gstatic.com"crossorigin>
 <link href=
  "https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
  rel="stylesheet">
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
 <style>
 :root{
  --cell-size:24px;
}
  
 body,
 button,
 input,
 select{
  font-family:'Noto Sans JP',sans-serif;
}
  
 body{
  background:#eef3f8;
  font-weight:500;
  margin:0;
  padding:15px;
 }
 
 h1{
  font-size:56px;
  font-weight:700;
  margin-top:0;
  letter-spacing:-0.03em;
 }

 h2{
  font-size:18px;
  font-weight:600;
}
  
 .card{
  background:white;
  border-radius:28px;
  padding:16px;
  overflow-x:auto;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
 }
 
 .progress{
  height:14px;
  background:#ddd;
  border-radius:99px;
  overflow:hidden;
 }
 
 .fill{
  height:100%;
  background:#22c55e;
 }
 
 .row{
  margin:10px 0;
 }
 
 .grid{
  display:flex;
  grid-template-columns:repeat(auto-fill,24px);
  flex-wrap:nowrap;
  gap:4px;
  overflow-x:auto;
 }
 
 .box{
  width:24px;
  height:24px;
  border-radius:5px;
  border:1px solid #bbb;
  cursor:pointer;
  flex-shrink:0;
 }
 
 .lesson.done{
  background:#22c55e;
 }
 
 .quiz.done{
  background:#3b82f6;
 }
 
 .final.done{
  background:#ef4444;
 }
 
 button{
  border:none;
  background:#2563eb;
  color:white;
  padding:10px;
  border-radius:10px;
 }
 
 input{
  padding:8px;
  margin:5px;
 }
 
 small{
  color:#666;
 }
  
 .top-area{
   display:flex;
   align-items:center;
   justify-content:flex-start;
   gap:24px;
   margin-bottom:16px;
 }
 
 .main-card{
  flex:3;
 }
 
 #daysBig{
  font-size:42px;
  font-weight:bold;
  color:#2563eb;
  margin:10px 0;
 }
  
 .history-week{
   display:flex;
   gap:8px;
   overflow-x:auto;
 }
 
 .day-card{
   min-width:140px;
   background:#f8fafc;
   border-radius:12px;
   padding:10px;
 }
 
 .day-title{
   font-weight:bold;
   margin-bottom:8px;
 }
  
 .collapsed{
   max-height:140px;
   overflow:hidden;
 }
 
 .show-more{
   color:#2563eb;
   cursor:pointer;
   margin-top:8px;
   font-weight:bold;
 }
  
 .countdown-card{
  flex:1;
  text-align:center;
 }
 
 .icon-btn{
   background:none;
   color:#2563eb;
   font-size:24px;
   padding:8px;
   transition:.2s;
 }
 
 .icon-btn:hover{
   background:#eef4ff;
   border-radius:8px;
 }
 
 .study-card{
   flex:1.5;
 }
  
 #studyTimer{
   font-size:42px;
   font-weight:bold;
   margin-bottom:10px;
 }
  
 .timer-card{
   flex:1;
 }

 .label{
 width:60px;
 flex-shrink:0;
 white-space:nowrap;
}

.overall-circle{
 position:relative;
 width:140px;
 height:140px;
 margin:0;
}

#overallPercent{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:28px;
 font-weight:700;
}
  
.countdown-area{
 width:380px;
 text-align:left;
}
  
.days-text{
  font-size:18px;
  font-weight:700;
  color:#2563eb;
  margin-bottom:10px;
}

.countdown-area .progress{
  width:100%;
} 

.timer-row{
  display:flex;
  align-items:center;
  gap:12px;
}

#timer{
  font-size:36px;
  font-weight:bold;
}
  
.summary-box{
 display:flex;
 align-items:center;
 gap:24px;
}

.plan-card{
  flex:1;
  min-height:180px;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-header{
  text-align:center;
  font-weight:bold;
  padding:8px;
}

.calendar-day{
  background:#f8fafc;
  border-radius:12px;
  min-height:120px;
  max-height:120px;
  overflow-y:auto;
  padding:8px;
}
  
.calendar-day:hover{
  background:#eef4ff;
}

.day-number{
  font-weight:bold;
}

@media (max-width:768px){
   :root{
    --cell-size:20px;
  }
 
   .box{
    width:20px;
    height:20px;
  }

  .grid{
    gap:2px;
  }

  .top-area{
    flex-direction:column;
    align-items:stretch;
  }

  h1{
    font-size:36px;
  }

  .overall-circle{
    margin:auto;
  }

  .countdown-area{
    width:100%;
  }

  .study-card{
    width:100%;
  }

  .timer-row{
    flex-wrap:wrap;
  }

  #timer,
  #studyTimer{
    font-size:28px;
  }
 

}

 </style>
</head>

<body>
 <div class="top-area">
  
  <h1>StudyBoard</h1>

  <div class="overall-circle">
    
   <svg width="140" height="140">
     
    <circle
     cx="70"
     cy="70"
     r="55"
     stroke="#e5e7eb"
     stroke-width="10"
     fill="none"
    />
   
    <circle
     id="overallCircle"
     cx="70"
     cy="70"
     r="55"
     stroke="#22c55e"
     stroke-width="10"
     fill="none"
     stroke-linecap="round"
     transform="rotate(-90 70 70)"
    />
     
   </svg>
    
  <div id="overallPercent">
   0%
  </div>
  
  </div>

  <div class="countdown-area">
   <div class="days-text">
    <div style="
    font-size:18px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:10px;">
    共テまで
     <span id="daysBig"></span>
    </div>
   </div>
   
    <div class="progress" style="margin-top:8px;">
     <div id="dayBar" class="fill"></div>
   </div>
  </div>
  
 </div>

 <div class="top-area">

  <div class="card plan-card">
    <h2>Today</h2>
    <div id="todayPlans"></div>
  </div>

  <div class="card plan-card">
    <h2>Tomorrow</h2>
    <div id="tomorrowPlans"></div>
  </div>

</div>

 <div class="card">

  <div id="history" class="collapsed"></div>

  <div class="show-more"
       onclick="toggleHistory()"
       id="historyButton">
    ▼ もっと見る
  </div>
</div>
 
<div id="courses"></div>
  
<div class="card">
<h2>講座追加</h2>
 
<select id="subject">
  <option>数学</option>
  <option>英語</option>
  <option>物理</option>
</select>
 
<input id="name" placeholder="講座名">

<input id="lessonCount" type="number" placeholder="授業数">

<input id="finalCount" type="number" placeholder="終了判定数">

<button onclick="addCourse()">追加</button>

</div>

<div class="card">

  <h2>予定管理</h2>
  <div id="calendar"></div>
 
</div>

<div class="card">

  <h2 id="selectedDate">
    日付を選択
  </h2>

  <div id="dayPlanList"></div>

</div>
 
<button
 onclick="addPlan()"
>
 ＋予定追加
</button>

<div
 id="addPlanForm"
 style="
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.4);
 z-index:1000;
 "
>

 <div
  style="
  background:white;
  width:300px;
  padding:20px;
  border-radius:20px;
  margin:100px auto;
  "
 >

  <h3>予定追加</h3>

  <select
 id="planCourse"
 onchange="updateLessonSelect()"
></select>

  <select id="planLesson"></select>
  
  <br><br>

  <br><br>

  <button onclick="savePlan()">
   追加
  </button>

  <button onclick="closePlanForm()">
   キャンセル
  </button>

 </div>

</div>
</div>
 
<script>
 
function toggleHistory(){

 const historyDiv =
 document.getElementById("history");

 const button =
 document.getElementById("historyButton");

 historyDiv.classList.toggle("collapsed");

 if(historyDiv.classList.contains("collapsed")){
   button.innerText = "▼ もっと見る";
 }else{
   button.innerText = "▲ 閉じる";
 }
 
 }

const examDate=new Date("2027-01-16");

window.courses=
JSON.parse(localStorage.getItem("courses"))||[];

const courses = window.courses;

const today =
new Date().toLocaleDateString("ja-JP");

const lastDate =
localStorage.getItem("lastDate");


const totalHistory =
JSON.parse(
 localStorage.getItem("totalHistory")
) || [];
 
const history =
JSON.parse(localStorage.getItem("history")) || [];
 
const studyHistory =
JSON.parse(
 localStorage.getItem("studyHistory")
) || [];

if(lastDate && lastDate !== today){

const studyHistory =
  JSON.parse(
    localStorage.getItem("studyHistory")
  ) || [];
 
  studyHistory.unshift({
    date:lastDate,
    seconds:Number(
      localStorage.getItem("todaySeconds")
    ) || 0
  });
 
  localStorage.setItem(
    "studyHistory",
    JSON.stringify(studyHistory)
  );

 const yesterdaySeconds =
   Number(
    localStorage.getItem(
      "todaySeconds"
    )
   ) || 0;

totalHistory.unshift({
 date:lastDate,
 seconds:yesterdaySeconds
});

 localStorage.setItem(
   "todaySeconds",
   "0"
 );
 
localStorage.setItem(
 "totalHistory",
 JSON.stringify(totalHistory)
);

localStorage.setItem(
  "lastDate",
  today
);

}






const plans =
JSON.parse(
 localStorage.getItem("plans")
) || [];





let selectedDay = null;

 



 
 
async function save(){

  localStorage.setItem(
    "courses",
    JSON.stringify(window.courses)
  );

  if(!window.db || !window.doc || !window.setDoc){
    return;
  }

  await window.setDoc(
    window.doc(window.db,"courses","main"),
    {
      courses:window.courses
    }
  );
}



 
function toggle(type,course,index){

 const before = course[type][index];

 course[type][index]=!course[type][index];

 if(!before && course[type][index]){

   const today =
   new Date().toLocaleDateString("ja-JP");

   history.unshift({
     date: today,
     timestamp: Date.now(),
     subject: course.subject,
     course: course.name,
     type:
       type==="lesson" ? "授業" :
       type==="quiz" ? "確認" :
       "終了判定",
     number: index+1
   });

   localStorage.setItem(
     "history",
     JSON.stringify(history)
   );
 }

 save();

 render();
}

 
 
function addCourse(){
 
 const subject =
 document.getElementById("subject").value;
 
 const name=
 document.getElementById("name").value;

 const lesson=
 Number(
 document.getElementById("lessonCount").value);

 const finals=
 Number(
 document.getElementById("finalCount").value);

 if(!name)return;

 courses.push({
  subject,
  name,
  lesson:Array(lesson).fill(false),
  quiz:Array(lesson).fill(false),
  final:Array(finals).fill(false)
 });

 save();

 render();
}

function deleteCourse(index){

 if(!confirm("この講座を削除しますか？")){
  return;
 }

 courses.splice(index,1);

 save();

 render();
}


function count(arr){
 return arr.filter(x=>x).length;
}

const subjectColors = {
  "数学":"#3b82f6",
  "英語":"#22c55e",
  "物理":"#ef4444",
};





 
function render(){

 let html="";

 let totalDone=0;
 let totalItems=0;
 
const activeCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done < total;
});

const completedCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done >= total;
});
 
[...activeCourses, ...completedCourses]
.forEach((course)=>{

 const originalIndex =
 courses.indexOf(course);

   const done=
   count(course.lesson)+
   count(course.quiz)+
   count(course.final);

   const total=
   course.lesson.length+
   course.quiz.length+
   course.final.length;

   totalDone+=done;
   totalItems+=total;

   const percent=
   total===0?0:
   Math.round(done/total*100);
   
   const isComplete = percent === 100;
 
   html+=`
 
<div class="card"
style="
border-left:8px solid ${subjectColors[course.subject] || '#999'};
${isComplete ? 'background:#ecfdf5;' : ''}
">

  <h2 style="display:flex;justify-content:space-between;align-items:center;">
   <span>
    ${isComplete ? '🌸 ' : ''}
    ${course.subject}｜${course.name}
   </span>
   <button onclick="deleteCourse(${originalIndex})"
    style="background:#ef4444;padding:6px 10px;">
    🗑️
   </button>
  </h2>

  <div>
  進捗 ${percent}%
  </div>

  <div class="progress">
  <div class="fill"
  style="width:${percent}%"></div>
  </div>

 <div style="display:flex;align-items:center;">
 <div style="width:60px;"></div>
<div class="grid">
  ${course.lesson.map((x,i)=>
`<div class="lesson-number"
style="
width:var(--cell-size);
text-align:center;
font-size:11px;
">
${i+1}
</div>`
).join("")}
 </div>
 </div>
 
 <div style="display:flex;align-items:center;margin-bottom:4px;">
 <div class="label">
  授業
 </div>

<div style="overflow-x:auto;">
<div class="grid">
   ${course.lesson.map((x,i)=>
   `<div
    class="box lesson ${x?'done':''}"
    onclick="toggle('lesson',courses[${originalIndex}],${i})"
   >
   </div>`
 ).join("")}
</div>
</div>
</div>

<div style="display:flex;align-items:center;">
<div class="label">
 テスト
</div>

<div class="grid">
 ${course.quiz.map((x,i)=>
 `<div class="box quiz ${x?'done':''}"
 onclick="toggle('quiz',courses[${originalIndex}],${i})"></div>`
 ).join("")}

</div>
</div>

<div class="row">
 終了判定 ${count(course.final)}/${course.final.length}
 <div class="grid">
  ${course.final.map((x,i)=>
  `<div
   class="box final ${x?'done':''}"
   onclick="toggle(
    'final',
    courses[${originalIndex}],
    ${i} 
    )"
  >
  </div>
  `
  ).join("")}

 </div>
</div>
</div>
</div>
</div>

`;
 });





 document.getElementById("courses")
 .innerHTML=html;

 let overall=
 totalItems===0
 ?0
 :Math.round(totalDone/totalItems*100);

 const radius = 55;

 const circumference =
 2 * Math.PI * radius;

const offset =
 circumference * (1 - overall / 100);

document.getElementById(
 "overallCircle"
).style.strokeDasharray =
 circumference;

document.getElementById(
 "overallCircle"
).style.strokeDashoffset =
 offset;

document.getElementById(
 "overallPercent"
).innerText =
 `${overall}%`;

const days=
Math.ceil(
 (examDate-new Date())/86400000);

document.getElementById("daysBig")
.innerHTML=`${days}日`;
 
const totalDays=550;

const remainPercent=
Math.max(0,days/totalDays*100);

document
.getElementById("dayBar")
.style.width=
remainPercent+"%";

const merged = [
 ...history,
 ...studyHistory
];

const grouped = {};

merged.forEach(h=>{

  if(!grouped[h.date]){
    grouped[h.date]=[];
  }
  grouped[h.date].push(h);
});

document.getElementById("history").innerHTML =
`
<div class="history-week">

${Object.entries(grouped)
.slice(0,7)
.map(([date,items])=>`

<div class="day-card">

<div class="day-title">
 ${date}
</div>

${items.map(item=>`

<div style="font-size:12px;margin:4px 0;">

${
 item.category === "study"
 ?
 `⏱ ${item.title}
 <br>
 ${item.minutes}分`
 
 :
 `📚 ${item.course}
 <br>
 ${item.type}${item.number}`
}

</div>

`).join("")}

</div>

`).join("")}

</div>
`;


const todayStr =
 new Date().toLocaleDateString("ja-JP");

const tomorrowObj =
 new Date();

tomorrowObj.setDate(
 tomorrowObj.getDate()+1
);

const tomorrowStr =
 tomorrowObj.toLocaleDateString("ja-JP");

document.getElementById(
 "todayPlans"
).innerHTML =
plans
.filter(p=>p.date===todayStr)
.map(p=>`
<label>
<input
 type="checkbox"
 ${p.done?"checked":""}
>
 ${courses[p.courseIndex]?.name}
第${p.lessonIndex+1}講
</label><br>
`).join("");

document.getElementById(
 "tomorrowPlans"
).innerHTML =
plans
.filter(p=>p.date===tomorrowStr)
.map(p=>`
<label>
<input
 type="checkbox"
 ${p.done?"checked":""}
>
 ${courses[p.courseIndex]?.name}
第${p.lessonIndex+1}講
</label><br>
`).join("");

}

window.render = render;
render();

 
function renderCalendar(){

 const calendar =
 document.getElementById("calendar");

 const now = new Date();

 const year = now.getFullYear();
 const month = now.getMonth();

 const firstDay =
  new Date(year,month,1);

 const lastDay =
  new Date(year,month+1,0);

 let html = `
 <h3>
  ${year}年${month+1}月
 </h3>

 <div class="calendar-grid">
 `;

 const weekdays =
 ["日","月","火","水","木","金","土"];

 weekdays.forEach(day=>{

  html += `
  <div class="calendar-header">
   ${day}
  </div>
  `;

 });

 for(
  let i=0;
  i<firstDay.getDay();
  i++
 ){
  html += `<div></div>`;
 }

 for(
  let day=1;
  day<=lastDay.getDate();
  day++
 ){

 const dayPlans =
 plans.filter(
  p=>p.day===day
 );

 const preview =
 dayPlans.map(p=>`
 <div style="font-size:11px;">
  ${courses[p.courseIndex]?.name}
  第${p.lessonIndex+1}講
 </div>
 `).join("");
  
 const count =
 dayPlans.length;
  
  html += `
  <div
   class="calendar-day"
   onclick="openDay(${day})"
  >

   <div class="day-number">
    ${day}
   </div>

<div style="
 font-size:11px;
 margin-top:4px;
">
 ${preview}
</div>

  </div>
  `;

 }

 html += `
 </div>
 `;

 calendar.innerHTML = html;

}





function openDay(day){

selectedDay = day;
 
const dayPlans =
 plans.filter(
  p => p.day === day
 );

document.getElementById(
  "selectedDate"
 ).innerText =
 `${day}日の予定`;

 document.getElementById(
  "dayPlanList"
 ).innerHTML =
 dayPlans
.map((p,i)=>{

 const course =
 courses[p.courseIndex];

 return `
 <div
  style="
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  "
 >

  <span>
   ${course.name}
   第${p.lessonIndex+1}講
  </span>

  <button
   onclick="deletePlan(${day},${i})"
   style="
   background:#ef4444;
   padding:4px 8px;
   "
  >
   ✕
  </button>

 </div>
 `;
})
.join("")

}



function deletePlan(day,index){

 const dayPlans =
 plans.filter(
  p => p.day === day
 );

 const target =
 dayPlans[index];

 const removeIndex =
 plans.indexOf(target);

 plans.splice(
  removeIndex,
  1
 );

 localStorage.setItem(
  "plans",
  JSON.stringify(plans)
 );

 renderCalendar();

 openDay(day);
}





function addPlan(){

 if(selectedDay === null){
  alert("先に日付を選択してください");
  return;
 }

 document.getElementById(
  "addPlanForm"
 ).style.display = "block";

 document.getElementById(
  "planCourse"
 ).innerHTML =
 courses.map((course,i)=>`
 <option value="${i}">
  ${course.subject}｜${course.name}
 </option>
 `).join("");

 updateLessonSelect();

}


async function savePlans(){
 
try{

  localStorage.setItem(
   "plans",
   JSON.stringify(plans)
  );

  if(!window.db){
   console.log("dbなし");
   return;
  }

  await window.setDoc(
   window.doc(
    window.db,
    "plans",
    "main"
   ),
   {
    plans
   }
  );

  console.log("plans保存成功");

 }catch(err){

  console.error(
   "plans保存失敗",
   err
  );

 }

}
 

async function savePlan(){

 const courseIndex =
 Number(
  document.getElementById(
   "planCourse"
  ).value
 );

 const lessonIndex =
 Number(
  document.getElementById(
   "planLesson"
  ).value
 );

 plans.push({
  day:selectedDay,
  courseIndex,
  lessonIndex
 });

 await savePlans();

 document.getElementById(
  "addPlanForm"
 ).style.display = "none";

 renderCalendar();
 openDay(selectedDay);

}

 


 
function closePlanForm(){

 document.getElementById(
  "addPlanForm"
 ).style.display = "none";

}



function updateLessonSelect(){

 const courseIndex =
 Number(
  document.getElementById(
   "planCourse"
  ).value
 );

 const course =
 courses[courseIndex];

 document.getElementById(
  "planLesson"
 ).innerHTML =
 course.lesson.map((_,i)=>`
 <option value="${i}">
  第${i+1}講
 </option>
 `).join("");

}
 
 window.openDay = openDay;
 window.deletePlan = deletePlan;
 window.addPlan = addPlan;
renderCalendar();
 
</script>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
