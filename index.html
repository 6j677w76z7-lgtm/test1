<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>受験講座ダッシュボード</title>

<style>
body{
 background:#f4f7fb;
 font-family:sans-serif;
 margin:0;
 padding:15px;
}

h1{
 margin-top:0;
}

.card{
 background:white;
 border-radius:16px;
 padding:16px;
 margin-bottom:16px;
 box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.progress{
 height:14px;
 background:#ddd;
 border-radius:99px;
 overflow:hidden;
}

.fill{
 height:100%;
 background:#22c55e;
}

.row{
 margin:10px 0;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,24px);
 gap:4px;
}

.box{
 width:24px;
 height:24px;
 border-radius:5px;
 border:1px solid #bbb;
 cursor:pointer;
}

.lesson.done{
 background:#22c55e;
}

.quiz.done{
 background:#3b82f6;
}

.final.done{
 background:#ef4444;
}

button{
 border:none;
 background:#2563eb;
 color:white;
 padding:10px;
 border-radius:10px;
}

input{
 padding:8px;
 margin:5px;
}

small{
 color:#666;
}
.top-area{
 display:flex;
 gap:16px;
 margin-bottom:16px;
}

.main-card{
 flex:3;
}

#daysBig{
 font-size:42px;
 font-weight:bold;
 color:#2563eb;
 margin:10px 0;
}
 
.history-week{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.day-card{
  min-width:140px;
  background:#f8fafc;
  border-radius:12px;
  padding:10px;
}

.day-title{
  font-weight:bold;
  margin-bottom:8px;
}
 
.collapsed{
  max-height:140px;
  overflow:hidden;
}

.show-more{
  color:#2563eb;
  cursor:pointer;
  margin-top:8px;
  font-weight:bold;
}
 
.countdown-card{
 flex:1;
 text-align:center;
}
</style>
</head>

<body>
 <div class="top-area">

  <div class="card main-card">

  <h1>StudyBoard</h1>
 
   <div id="overallText"></div>
 
   <div class="progress">
    <div id="overallBar" class="fill"></div>
   </div>
  </div>

  <div class="card countdown-card">
   <div style="
   font-size:18px;
   font-weight:bold;
   color:#2563eb;
   margin-bottom:10px;">
   共テまで
    <span id="daysBig"></span>
   </div>

   <div class="progress" style="margin-top:8px;">
    <div id="dayBar" class="fill"></div>
   </div>

  </div>
 </div>
 
 <div class="top-area">
  <div class="card">
  
   <h2>Timer</h2>
  
   <div id="timer"
    style="font-size:36px;font-weight:bold;">
    00:00:00
   </div>
  
   <button onclick="startTimer()">
   Start
   </button>
  
   <button onclick="stopTimer()">
   Stop
   </button>
  <button onclick="resetTimer()">
   Reset
  </button>
  
  </div>
  <div class="card">
    <h2>⏱ Self Study</h2>

    <div id="studyTimer">00:00:00</div>

    <input
      id="studyTitle"
      placeholder="青チャート">

    <button onclick="startStudyTimer()">
      Start
    </button>

    <button onclick="stopStudyTimer()">
      Stop
    </button>

    <button onclick="saveStudy()">
      記録
    </button>
   
    <button onclick="resetTimer()">
    Reset
    </button>
  
  </div>
  
</div>
 
 <div class="card">

  <div id="history" class="collapsed"></div>

  <div class="show-more"
       onclick="toggleHistory()"
       id="historyButton">
    ▼ もっと見る
  </div>
</div>
 
<div id="courses"></div>
  
<div class="card">
<h2>講座追加</h2>
 
<select id="subject">
  <option>数学</option>
  <option>英語</option>
  <option>物理</option>
</select>
 
<input id="name" placeholder="講座名">

<input id="lessonCount" type="number" placeholder="授業数">

<input id="finalCount" type="number" placeholder="終了判定数">

<button onclick="addCourse()">追加</button>

</div>

<script>
function toggleHistory(){

 const historyDiv =
 document.getElementById("history");

 const button =
 document.getElementById("historyButton");

 historyDiv.classList.toggle("collapsed");

 if(historyDiv.classList.contains("collapsed")){
   button.innerText = "▼ もっと見る";
 }else{
   button.innerText = "▲ 閉じる";
 }
 
 }
 
const examDate=new Date("2027-01-16");

const courses=
JSON.parse(localStorage.getItem("courses"))||[];

const today =
new Date().toLocaleDateString("ja-JP");

const lastDate =
localStorage.getItem("lastDate");

if(lastDate && lastDate !== today){

const studyHistory =
  JSON.parse(
    localStorage.getItem("studyHistory")
  ) || [];

  studyHistory.unshift({
    date:lastDate,
    seconds:Number(
      localStorage.getItem("todaySeconds")
    ) || 0
  });

  localStorage.setItem(
    "studyHistory",
    JSON.stringify(studyHistory)
  );

  localStorage.setItem(
    "todaySeconds",
    "0"
  );
}

localStorage.setItem(
  "lastDate",
  today
);

const history =
JSON.parse(localStorage.getItem("history")) || [];
 
const studyHistory =
JSON.parse(
 localStorage.getItem("studyHistory")
) || [];
 
function save(){
 localStorage.setItem("courses",
 JSON.stringify(courses));
}

function toggle(type,course,index){

 const before = course[type][index];

 course[type][index]=!course[type][index];

 if(!before && course[type][index]){

   const today =
   new Date().toLocaleDateString("ja-JP");

   history.unshift({
     date: today,
     subject: course.subject,
     course: course.name,
     type:
       type==="lesson" ? "授業" :
       type==="quiz" ? "確認" :
       "終了判定",
     number: index+1
   });

   localStorage.setItem(
     "history",
     JSON.stringify(history)
   );
 }

 save();

 render();
}
 
function addCourse(){
 
 const subject =
 document.getElementById("subject").value;
 
 const name=
 document.getElementById("name").value;

 const lesson=
 Number(
 document.getElementById("lessonCount").value);

 const finals=
 Number(
 document.getElementById("finalCount").value);

 if(!name)return;

 courses.push({
  subject,
  name,
  lesson:Array(lesson).fill(false),
  quiz:Array(lesson).fill(false),
  final:Array(finals).fill(false)
 });

 save();

 render();
}

function deleteCourse(index){

 if(!confirm("この講座を削除しますか？")){
  return;
 }

 courses.splice(index,1);

 save();

 render();
}
function count(arr){
 return arr.filter(x=>x).length;
}
const subjectColors = {
  "数学":"#3b82f6",
  "英語":"#22c55e",
  "物理":"#ef4444",
};
function render(){

 let html="";

 let totalDone=0;
 let totalItems=0;
 
const activeCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done < total;
});

const completedCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done >= total;
});
 
[...activeCourses, ...completedCourses]
.forEach((course)=>{

 const originalIndex =
 courses.indexOf(course);

   const done=
   count(course.lesson)+
   count(course.quiz)+
   count(course.final);

   const total=
   course.lesson.length+
   course.quiz.length+
   course.final.length;

   totalDone+=done;
   totalItems+=total;

   const percent=
   total===0?0:
   Math.round(done/total*100);
   
   const isComplete = percent === 100;
 
   html+=`
 
<div class="card"
style="
border-left:8px solid ${subjectColors[course.subject] || '#999'};
${isComplete ? 'background:#ecfdf5;' : ''}
">

<h2 style="display:flex;justify-content:space-between;align-items:center;">
 <span>
  ${isComplete ? '🌸 ' : ''}
  ${course.subject}｜${course.name}
 </span>
 <button onclick="deleteCourse(${originalIndex})"
  style="background:#ef4444;padding:6px 10px;">
  🗑️
 </button>
</h2>

<div>
進捗 ${percent}%
</div>

<div class="progress">
<div class="fill"
style="width:${percent}%"></div>
</div>

<div class="row">
<b>授業・確認テスト</b>

<div style="display:flex;align-items:center;">

<div style="width:50px;"></div>

<div class="grid"
style="grid-template-columns:repeat(${course.lesson.length},24px);">
${course.lesson.map((x,i)=>
`<div style="
width:24px;
text-align:center;
font-size:11px;
">
${i+1}
</div>`
).join("")}
</div>

</div>

<div style="display:flex;align-items:center;margin-bottom:4px;">

<div style="width:50px;font-weight:bold;">
授業
</div>

<div class="grid"
style="grid-template-columns:repeat(${course.lesson.length},24px);">

${course.lesson.map((x,i)=>
`<div class="box lesson ${x?'done':''}"
onclick="toggle('lesson',courses[${originalIndex}],${i})"></div>`
).join("")}

</div>

</div>

<div style="display:flex;align-items:center;">

<div style="width:50px;font-weight:bold;">
確認
</div>

<div class="grid"
style="grid-template-columns:repeat(${course.quiz.length},24px);">

${course.quiz.map((x,i)=>
`<div class="box quiz ${x?'done':''}"
onclick="toggle('quiz',courses[${originalIndex}],${i})"></div>`
).join("")}

</div>

</div>

</div>


<div class="row">
<b>終了判定 ${count(course.final)}/${course.final.length}</b>

<div class="grid">

${course.final.map((x,i)=>
`<div class="box final ${x?'done':''}"
onclick="toggle('final',courses[${originalIndex}],${i})"></div>`
).join("")}

</div>
</div>

</div>
`;
 });

 document.getElementById("courses")
 .innerHTML=html;

 let overall=
 totalItems===0
 ?0
 :Math.round(totalDone/totalItems*100);

 document.getElementById("overallText")
 .innerHTML=
 `${overall}% (${totalDone}/${totalItems})`;

 document.getElementById("overallBar")
 .style.width=
 overall+"%";

 const days=
Math.ceil(
 (examDate-new Date())/86400000);

document.getElementById("daysBig")
.innerHTML=`${days}日`;
 
const totalDays=550;

const remainPercent=
Math.max(0,days/totalDays*100);

document
.getElementById("dayBar")
.style.width=
remainPercent+"%";

const grouped = {};

history.forEach(h=>{
  if(!grouped[h.date]){
    grouped[h.date]=[];
  }
  grouped[h.date].push(h);
});

document.getElementById("history").innerHTML =
`
<div class="history-week">

${Object.entries(grouped)
.slice(0,7)
.map(([date,items])=>`

<div class="day-card">

<div class="day-title">
${date}
</div>

${items.map(item=>`
<div style="font-size:12px;margin:4px 0;">
${item.course}
<br>
${item.type}${item.number}
</div>
`).join("")}

</div>

`).join("")}

</div>
`;
}
 
 
let seconds =
Number(
  localStorage.getItem("todaySeconds")
) || 0;

let timerId = null;
 
function updateTimer(){

  const h =
  String(Math.floor(seconds/3600))
  .padStart(2,"0");

  const m =
  String(Math.floor(seconds%3600/60))
  .padStart(2,"0");

  const s =
  String(seconds%60)
  .padStart(2,"0");

  document.getElementById("timer")
  .innerText =
  `${h}:${m}:${s}`;
}

function startTimer(){

  if(timerId) return;

  timerId = setInterval(()=>{

    seconds++;

    localStorage.setItem(
      "todaySeconds",
      seconds
    );

    updateTimer();

  },1000);

}

function stopTimer(){

  clearInterval(timerId);

  timerId = null;

}
function resetTimer(){
  
   stopTimer();
  
   seconds = 0;
  
   localStorage.setItem(
     "todaySeconds",
     0
   );
  
   updateTimer();
  }
 
updateTimer();
 
render();

let studySeconds = 0;

let studyTimerId = null;
 
function updateStudyTimer(){

const h =
String(Math.floor(studySeconds/3600))
 .padStart(2,"0");

const m =
String(Math.floor(studySeconds%3600/60))
.padStart(2,"0");

const s =
String(studySeconds%60)
.padStart(2,"0");
  
document.getElementById("studyTimer")
.innerText =
`${h}:${m}:${s}`;
}
 
function startStudyTimer(){
  
if(studyTimerId) return;
  
studyTimerId = setInterval(()=>{
  
studySeconds++;
  
updateStudyTimer();
  
},1000);
  
}

function stopStudyTimer(){
  
clearInterval(studyTimerId);
  
studyTimerId = null;
    
}

updateStudyTimer();
 
function resetStudyTimer(){

 stopStudyTimer();

 studySeconds = 0;

 updateStudyTimer();
}
 
</script>

<script type="module">

  getFirestore,
  doc,
  setDoc

  projectId: "test1-5a7a3",
  storageBucket: "test1-5a7a3.firebasestorage.app",
  messagingSenderId: "43205620776",

await setDoc(
  doc(db, "courses", "main"),
  {
    courses: courses
  }

</script>
</body>
</html>
