<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1">
 <title>受験講座ダッシュボード</title>

 <link rel="preconnect" href="https://fonts.googleapis.com"crossorigin>
 <link rel="preconnect" href="https://fonts.gstatic.com"crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"rel="stylesheet">

 <style>
 body,
 button,
 input,
 select{
  font-family:'Noto Sans JP',sans-serif;
}
  
 body{
  background:#eef3f8;
  font-weight:500;
  margin:0;
  padding:15px;
 }
 
 h1{
  font-size:56px;
  font-weight:700;
  margin-top:0;
  letter-spacing:-0.03em;
 }

 h2{
  font-size:18px;
  font-weight:600;
}
  
 .card{
  background:white;
  border-radius:28px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
 }
 
 .progress{
  height:14px;
  background:#ddd;
  border-radius:99px;
  overflow:hidden;
 }
 
 .fill{
  height:100%;
  background:#22c55e;
 }
 
 .row{
  margin:10px 0;
 }
 
 .grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,24px);
  gap:4px;
 }
 
 .box{
  width:24px;
  height:24px;
  border-radius:5px;
  border:1px solid #bbb;
  cursor:pointer;
 }
 
 .lesson.done{
  background:#22c55e;
 }
 
 .quiz.done{
  background:#3b82f6;
 }
 
 .final.done{
  background:#ef4444;
 }
 
 button{
  border:none;
  background:#2563eb;
  color:white;
  padding:10px;
  border-radius:10px;
 }
 
 input{
  padding:8px;
  margin:5px;
 }
 
 small{
  color:#666;
 }
  
 .top-area{
   display:flex;
   align-items:center;
   justify-content:flex-start;
   gap:24px;
   margin-bottom:16px;
 }
 
 .main-card{
  flex:3;
 }
 
 #daysBig{
  font-size:42px;
  font-weight:bold;
  color:#2563eb;
  margin:10px 0;
 }
  
 .history-week{
   display:flex;
   gap:8px;
   overflow-x:auto;
 }
 
 .day-card{
   min-width:140px;
   background:#f8fafc;
   border-radius:12px;
   padding:10px;
 }
 
 .day-title{
   font-weight:bold;
   margin-bottom:8px;
 }
  
 .collapsed{
   max-height:140px;
   overflow:hidden;
 }
 
 .show-more{
   color:#2563eb;
   cursor:pointer;
   margin-top:8px;
   font-weight:bold;
 }
  
 .countdown-card{
  flex:1;
  text-align:center;
 }
 
 .icon-btn{
   background:none;
   color:#2563eb;
   font-size:24px;
   padding:8px;
   transition:.2s;
 }
 
 .icon-btn:hover{
   background:#eef4ff;
   border-radius:8px;
 }
 
 .study-card{
   flex:1.5;
 }
  
 #studyTimer{
   font-size:42px;
   font-weight:bold;
   margin-bottom:10px;
 }
  
 .timer-card{
   flex:1;
 }

 .label{
 width:60px;
 white-space:nowrap;
}

.overall-circle{
 position:relative;
 width:140px;
 height:140px;
 margin:0;
}

#overallPercent{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:28px;
 font-weight:700;
}
  
.countdown-area{
 width:380px;
 text-align:left;
}
  
.days-text{
  font-size:18px;
  font-weight:700;
  color:#2563eb;
  margin-bottom:10px;
}

.countdown-area .progress{
  width:100%;
} 

.timer-row{
  display:flex;
  align-items:center;
  gap:12px;
}

#timer{
  font-size:36px;
  font-weight:bold;
}
 </style>
</head>

<body>
 <div class="top-area">
  
  <h1>StudyBoard</h1>

  <div class="overall-circle">
    
   <svg width="140" height="140">
     
    <circle
     cx="70"
     cy="70"
     r="55"
     stroke="#e5e7eb"
     stroke-width="10"
     fill="none"
    />
   
    <circle
     id="overallCircle"
     cx="70"
     cy="70"
     r="55"
     stroke="#22c55e"
     stroke-width="10"
     fill="none"
     stroke-linecap="round"
     transform="rotate(-90 70 70)"
    />
     
   </svg>
    
  <div id="overallPercent">
   0%
  </div>
  
  </div>

  <div calss="countdown-area">
   <div class="days-text">
    <div style="
    font-size:18px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:10px;">
    共テまで
     <span id="daysBig"></span>
    </div>
   </div>
   
    <div class="progress" style="margin-top:8px;">
     <div id="dayBar" class="fill"></div>
   </div>
  </div>
  
 </div>
 
 <div class="top-area">
  <div class="card study-card">
  
   <h2>Total Study</h2>

   <div class="timer-row">
    <div id="timer"
     style="font-size:36px;font-weight:bold;">
     00:00:00
    </div>
   
    <button
     id="timerButton"
     onclick="toggleTimer()"
     class="icon-btn">
    ▷
    </button>
    
    <button
    onclick="resetTimer()"
    class="icon-btn">
    ↻
    </button>
   </div>
  
  </div>
  
  <div class="card study-card">
   <div style="
    display:flex;
    align-items:center;
    gap:12px;
    ">
    
     <h2>Self Study</h2>
 
     <input
     id="studyTitle"
     placeholder="青チャート">

   </div>
   
   <div class="timer-row">
    <div id="studyTimer">00:00:00</div>

    <button
    id="studyButton"
    onclick="toggleStudyTimer()"
    class="icon-btn">
    ▷
    </button>
   
    <button
     onclick="resetStudyTimer()"
     class="icon-btn">
    ↻
    </button>
  
    <button
     onclick="saveStudy()"
     class="icon-btn">
     ＋
    </button>
   </div>
   
  </div>
  
</div>
 
 <div class="card">

  <div id="history" class="collapsed"></div>

  <div class="show-more"
       onclick="toggleHistory()"
       id="historyButton">
    ▼ もっと見る
  </div>
</div>

<div class="card">

 <h2>Study Summary</h2>

 <div id="summary"></div>

</div>
 
<div id="courses"></div>
  
<div class="card">
<h2>講座追加</h2>
 
<select id="subject">
  <option>数学</option>
  <option>英語</option>
  <option>物理</option>
</select>
 
<input id="name" placeholder="講座名">

<input id="lessonCount" type="number" placeholder="授業数">

<input id="finalCount" type="number" placeholder="終了判定数">

<button onclick="addCourse()">追加</button>

</div>

<script>
function toggleHistory(){

 const historyDiv =
 document.getElementById("history");

 const button =
 document.getElementById("historyButton");

 historyDiv.classList.toggle("collapsed");

 if(historyDiv.classList.contains("collapsed")){
   button.innerText = "▼ もっと見る";
 }else{
   button.innerText = "▲ 閉じる";
 }
 
 }
 
const examDate=new Date("2027-01-16");

const courses=
JSON.parse(localStorage.getItem("courses"))||[];

const today =
new Date().toLocaleDateString("ja-JP");

const lastDate =
localStorage.getItem("lastDate");

if(lastDate && lastDate !== today){

const studyHistory =
  JSON.parse(
    localStorage.getItem("studyHistory")
  ) || [];

  studyHistory.unshift({
    date:lastDate,
    seconds:Number(
      localStorage.getItem("todaySeconds")
    ) || 0
  });

const totalHistory =
JSON.parse(
 localStorage.getItem("totalHistory")
) || [];
 
  localStorage.setItem(
    "studyHistory",
    JSON.stringify(studyHistory)
  );

  localStorage.setItem(
    "todaySeconds",
    "0"
  );
}

const totalHistory =
 JSON.parse(
  localStorage.getItem("totalHistory")
 ) || [];

totalHistory.unshift({

 date:lastDate,

 seconds:Number(
  localStorage.getItem(
   "todaySeconds"
  )
 ) || 0

});

localStorage.setItem(
 "totalHistory",
 JSON.stringify(totalHistory)
);
 
localStorage.setItem(
  "lastDate",
  today
);

const history =
JSON.parse(localStorage.getItem("history")) || [];
 
const studyHistory =
JSON.parse(
 localStorage.getItem("studyHistory")
) || [];




const totalSecondsAll =
 totalHistory.reduce(
  (sum,item)=>sum+item.seconds,
  0
 );

const totalHours =
 Math.floor(totalSecondsAll/3600);

const totalMinutes =
 Math.floor(
  totalSecondsAll%3600/60
 );

const todayHours =
 Math.floor(seconds/3600);

const todayMinutes =
 Math.floor(
  seconds%3600/60
 );

const weekSeconds =
 totalHistory
  .slice(0,7)
  .reduce(
   (sum,item)=>sum+item.seconds,
   0
  );
 

 

 
let isDragging = false;
 
 function startDrag(){
   isDragging = true;
 }

function dragFill(type, course, index){

  if(!isDragging) return;

  course[type][index] = true;
}

function stopDrag(){

  isDragging = false;

  save();

  render();
}


 
 
function save(){
 localStorage.setItem("courses",
 JSON.stringify(courses));
}

function toggle(type,course,index){

 const before = course[type][index];

 course[type][index]=!course[type][index];

 if(!before && course[type][index]){

   const today =
   new Date().toLocaleDateString("ja-JP");

   history.unshift({
     date: today,
     timestamp: Date.now(),
     subject: course.subject,
     course: course.name,
     type:
       type==="lesson" ? "授業" :
       type==="quiz" ? "確認" :
       "終了判定",
     number: index+1
   });

   localStorage.setItem(
     "history",
     JSON.stringify(history)
   );
 }

 save();

 render();
}
 
function addCourse(){
 
 const subject =
 document.getElementById("subject").value;
 
 const name=
 document.getElementById("name").value;

 const lesson=
 Number(
 document.getElementById("lessonCount").value);

 const finals=
 Number(
 document.getElementById("finalCount").value);

 if(!name)return;

 courses.push({
  subject,
  name,
  lesson:Array(lesson).fill(false),
  quiz:Array(lesson).fill(false),
  final:Array(finals).fill(false)
 });

 save();

 render();
}

function deleteCourse(index){

 if(!confirm("この講座を削除しますか？")){
  return;
 }

 courses.splice(index,1);

 save();

 render();
}
function count(arr){
 return arr.filter(x=>x).length;
}
const subjectColors = {
  "数学":"#3b82f6",
  "英語":"#22c55e",
  "物理":"#ef4444",
};
function render(){

 let html="";

 let totalDone=0;
 let totalItems=0;
 
const activeCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done < total;
});

const completedCourses =
courses.filter(course=>{

 const done =
 count(course.lesson)+
 count(course.quiz)+
 count(course.final);

 const total =
 course.lesson.length+
 course.quiz.length+
 course.final.length;

 return done >= total;
});
 
[...activeCourses, ...completedCourses]
.forEach((course)=>{

 const originalIndex =
 courses.indexOf(course);

   const done=
   count(course.lesson)+
   count(course.quiz)+
   count(course.final);

   const total=
   course.lesson.length+
   course.quiz.length+
   course.final.length;

   totalDone+=done;
   totalItems+=total;

   const percent=
   total===0?0:
   Math.round(done/total*100);
   
   const isComplete = percent === 100;
 
   html+=`
 
<div class="card"
style="
border-left:8px solid ${subjectColors[course.subject] || '#999'};
${isComplete ? 'background:#ecfdf5;' : ''}
">

  <h2 style="display:flex;justify-content:space-between;align-items:center;">
   <span>
    ${isComplete ? '🌸 ' : ''}
    ${course.subject}｜${course.name}
   </span>
   <button onclick="deleteCourse(${originalIndex})"
    style="background:#ef4444;padding:6px 10px;">
    🗑️
   </button>
  </h2>

  <div>
  進捗 ${percent}%
  </div>

  <div class="progress">
  <div class="fill"
  style="width:${percent}%"></div>
  </div>

 <div style="display:flex;align-items:center;">
 <div style="width:60px;"></div>
 <div class="grid"
 style="grid-template-columns:repeat(${course.lesson.length},24px);">
   ${course.lesson.map((x,i)=>
   `<div style="
   width:24px;
   text-align:center;
   font-size:11px;
   ">
   ${i+1}
   </div>`
   ).join("")}
 </div>
 </div>
 
 <div style="display:flex;align-items:center;margin-bottom:4px;">
 <div class="label">
  授業
 </div>

<div class="grid"
 style="grid-template-columns:repeat(${course.lesson.length},24px);">
   ${course.lesson.map((x,i)=>
   `
   <div
    class="box lesson ${x?'done':''}"
  
    onclick="toggle('lesson',courses[${originalIndex}],${i})"
   
    onmousedown="startDrag()"
   
    onmouseover="
    dragFill(
     'lesson',
     courses[${originalIndex}],
     ${i}
    )"
   
    ontouchstart="
    startDrag();
    toggle(
     'lesson',
     courses[${originalIndex}],
     ${i}
    )"
  
     ontouchmove="
    dragFill(
     'lesson',
     courses[${originalIndex}],
     ${i}
    )"
   >
   </div>
  `
 ).join("")}

</div>
</div>

<div style="display:flex;align-items:center;">
<div class="label">
 テスト
</div>

<div class="grid"
style="grid-template-columns:repeat(${course.quiz.length},24px);">

 ${course.quiz.map((x,i)=>
 `<div class="box quiz ${x?'done':''}"
 onclick="toggle('quiz',courses[${originalIndex}],${i})"></div>`
 ).join("")}

</div>
</div>

<div class="row">
 終了判定 ${count(course.final)}/${course.final.length}
 <div class="grid">
  ${course.final.map((x,i)=>
  `
  <div
   class="box quiz ${x?'done':''}"
  
   onclick="toggle(
    'quiz',
    courses[${originalIndex}],
    ${i}
   )"
  
   onmousedown="startDrag()"
  
   onmouseover="
    dragFill(
     'quiz',
     courses[${originalIndex}],
     ${i}
    )"
  
   ontouchstart="
    startDrag();
    toggle(
     'quiz',
     courses[${originalIndex}],
     ${i}
    )"
  
   ontouchmove="
    dragFill(
     'quiz',
     courses[${originalIndex}],
     ${i}
    )"
  >
  </div>
  `
  ).join("")}

 </div>
</div>
</div>
</div>
</div>

`;
 });

 document.getElementById("courses")
 .innerHTML=html;

 let overall=
 totalItems===0
 ?0
 :Math.round(totalDone/totalItems*100);

 const radius = 55;

 const circumference =
 2 * Math.PI * radius;

const offset =
 circumference * (1 - overall / 100);

document.getElementById(
 "overallCircle"
).style.strokeDasharray =
 circumference;

document.getElementById(
 "overallCircle"
).style.strokeDashoffset =
 offset;

document.getElementById(
 "overallPercent"
).innerText =
 `${overall}%`;

const days=
Math.ceil(
 (examDate-new Date())/86400000);

document.getElementById("daysBig")
.innerHTML=`${days}日`;
 
const totalDays=550;

const remainPercent=
Math.max(0,days/totalDays*100);

document
.getElementById("dayBar")
.style.width=
remainPercent+"%";

const totalItemsForHistory =
 totalHistory.map(item=>({

  date:item.date,

  category:"total",

  seconds:item.seconds

 }));

const merged = [
 ...history,
 ...studyHistory,
 ...totalItemsForHistory
];

const grouped = {};

merged.forEach(h=>{

  if(!grouped[h.date]){
    grouped[h.date]=[];
  }
  grouped[h.date].push(h);
});

document.getElementById("history").innerHTML =
`
<div class="history-week">

${Object.entries(grouped)
.slice(0,7)
.map(([date,items])=>`

<div class="day-card">

<div class="day-title">
 ${date}
</div>

${items.map(item=>`

<div style="font-size:12px;margin:4px 0;">

${
 item.category === "study"
 ?
 `⏱ ${item.title}
 <br>
 ${item.minutes}分`
 
 : item.category === "total"
 ?
 `📊 Total Study
 <br>
 ${Math.floor(item.seconds/3600)}時間
 ${Math.floor(item.seconds%3600/60)}分`
 
 :
 `📚 ${item.course}
 <br>
 ${item.type}${item.number}`
}

</div>

`).join("")}

</div>

`).join("")}

</div>
`;
}




 
 
function saveStudy(){

 const title =
 document.getElementById("studyTitle").value;

 if(!title) return;

 studyHistory.unshift({

  date:new Date()
   .toLocaleDateString("ja-JP"),

  timestamp: Date.now(),

  category:"study",

  title:title,

  minutes:
   Math.round(studySeconds/60)

  });
 
  localStorage.setItem(
  "studyHistory",
  JSON.stringify(studyHistory)
 );
 
 resetStudyTimer();

}
 
let seconds =
Number(
  localStorage.getItem("todaySeconds")
) || 0;

let startTime =
Number(
 localStorage.getItem(
  "timerStartTime"
 )
);

let timerRunning =
!!startTime;

function toggleTimer(){

  if(timerRunning){

    const elapsed =
    Math.floor(
      (Date.now() - startTime) / 1000
    );

    seconds += elapsed;

    localStorage.setItem(
      "todaySeconds",
      seconds
    );

    timerRunning = false;

    startTime = null;
    
    localStorage.removeItem(
      "timerStartTime"
    );
   
  }else{
  
    startTime = Date.now();
  
    localStorage.setItem(
      "timerStartTime",
      startTime
    );
  
    timerRunning = true;
  
  }

 updateTimerButton();
}

function updateTimer(){

  let currentSeconds = seconds;

  if(timerRunning){

    currentSeconds += Math.floor(
      (Date.now() - startTime) / 1000
    );

  }

  const h =
  String(Math.floor(currentSeconds/3600))
  .padStart(2,"0");

  const m =
  String(
    Math.floor(currentSeconds%3600/60)
  ).padStart(2,"0");

  const s =
  String(currentSeconds%60)
  .padStart(2,"0");

  document.getElementById("timer")
  .innerText =
  `${h}:${m}:${s}`;
}

function resetTimer(){

  timerRunning = false;

  startTime = null;

  seconds = 0;

  localStorage.setItem(
    "todaySeconds",
    0
  );
 
  localStorage.removeItem(
   "timerStartTime"
  );
 
  updateTimer();
}

updateTimerButton();

function updateTimerButton(){

 document.getElementById(
  "timerButton"
 ).innerText =
 timerRunning ? "Ⅱ" : "▷";

}



 

let studyStartTime =
Number(
 localStorage.getItem(
  "studyStartTime"
 )
);
 
let studyRunning =
!!studyStartTime;
 
let studySeconds =
Number(
  localStorage.getItem("studySeconds")
) || 0;

function toggleStudyTimer(){

 if(studyRunning){

  const elapsed =
  Math.floor(
   (Date.now()-studyStartTime)/1000
  );

  studySeconds += elapsed;

  localStorage.setItem(
   "studySeconds",
   studySeconds
  );

  studyRunning = false;

  studyStartTime = null;

  localStorage.removeItem(
  "studyStartTime"
  );
   if(timerRunning){

   const timerElapsed =
   Math.floor(
     (Date.now()-startTime)/1000
   );

   seconds += timerElapsed;
    
   localStorage.setItem(
     "todaySeconds",
     seconds
   );

   timerRunning = false;

   startTime = null;

   localStorage.removeItem(
     "timerStartTime"
   );

   updateTimerButton();
 }
 
}else{

  studyStartTime = Date.now();

  localStorage.setItem(
    "studyStartTime",
    studyStartTime
  );

  studyRunning = true;

  if(!timerRunning){
  
    startTime = Date.now();
  
    localStorage.setItem(
      "timerStartTime",
      startTime
    );
  
    timerRunning = true;
  
    updateTimerButton();
  }
 }
 updateStudyButton();
}
 
function updateStudyTimer(){

 let currentSeconds = studySeconds;

 if(studyRunning){

  currentSeconds += Math.floor(
   (Date.now()-studyStartTime)/1000
  );

 }

 const h =
 String(Math.floor(currentSeconds/3600))
 .padStart(2,"0");

 const m =
 String(Math.floor(currentSeconds%3600/60))
 .padStart(2,"0");

 const s =
 String(currentSeconds%60)
 .padStart(2,"0");

 document.getElementById("studyTimer")
 .innerText =
 `${h}:${m}:${s}`;
}

function resetStudyTimer(){

 studyRunning = false;

 studyStartTime = null;

 studySeconds = 0;

 localStorage.setItem(
  "studySeconds",
  0
 );
 
 localStorage.removeItem(
 "studyStartTime"
);
 
 updateStudyTimer();
 updateStudyButton();
}
 
function updateStudyButton(){

 document.getElementById(
  "studyButton"
 ).innerText =
 studyRunning ? "Ⅱ" : "▷";

}
 
setInterval(updateTimer,1000);
setInterval(updateStudyTimer,1000);

updateTimer();
updateStudyTimer();

updateTimerButton();
updateStudyButton();

ocument.getElementById(
 "summary"
).innerHTML =

`今日 ${todayHours}時間${todayMinutes}分
 <br><br>
 今週 ${weekHours}時間${weekMinutes}分
 <br><br>
 累計 ${totalHours}時間${totalMinutes}分`;
 
render();


 
</script>

<script type="module">

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhC-Ot5pmbkGhGoV8yFTz5ZjIK3EVObbw",
  authDomain: "test1-5a7a3.firebaseapp.com",
  projectId: "test1-5a7a3",
  storageBucket: "test1-5a7a3.firebasestorage.app",
  messagingSenderId: "43205620776",
  appId: "1:43205620776:web:b73c37c0462f29cfb0b11d",
  measurementId: "G-KVW1L9T7NV"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

await setDoc(
  doc(db, "courses", "main"),
  {
    courses: courses
  }
);

console.log("Firestore接続成功");

</script>
</body>
</html>
